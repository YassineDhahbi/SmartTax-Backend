# Profil CI / tests (sans PostgreSQL ni services externes)
spring.application.name=ArabSoftBack-test

spring.datasource.url=jdbc:h2:mem:smarttax;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test@smarttax.local
spring.mail.password=test-password

recaptcha.secret.key=test-recaptcha-key
training.data.path=/tmp/smarttax-training
app.base-url=http://localhost:8080
app.kafka.notification-topic=smarttax.notifications.test
spring.kafka.consumer.group-id=smarttax-notifications-test

app.kafka.autostart=false
ocr.service.enabled=false
ocr.service.autostart=false
face.verification.service.enabled=false
face.verification.service.autostart=false
face.verification.service.url=http://localhost:8005
sentiment.service.enabled=false
sentiment.service.autostart=false
sms.service.enabled=false

ai.model.path=classpath:models/missing-model.pt
