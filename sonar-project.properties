# SonarCloud — SmartTax Backend (Spring Boot / Java)
#
# En CI (GitHub Actions) : organisation et token viennent des secrets
#   SONAR_ORGANIZATION  +  SONAR_TOKEN
#
# En local : remplacez YOUR_SONARCLOUD_ORG par votre Organization Key SonarCloud
#   https://sonarcloud.io > votre organisation > Organization Key

sonar.projectKey=YOUR_SONARCLOUD_ORG_smarttax-backend
sonar.projectName=SmartTax Backend
sonar.organization=YOUR_SONARCLOUD_ORG

sonar.host.url=https://sonarcloud.io

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/dto/**,**/entity/**

sonar.coverage.exclusions=**/*
sonar.qualitygate.wait=false
