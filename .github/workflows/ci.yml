# SmartTax Backend — CI Maven + SonarCloud
# Declenchement : push ou PR sur main / master / develop

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: SonarCloud analysis (Maven)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x mvnw
          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::Ajoutez le secret GitHub SONAR_TOKEN (SonarCloud > My Account > Security > Generate Token)"
            exit 1
          fi
          ORG=$(printf '%s' "$SONAR_ORGANIZATION" | tr -d '[:space:]')
          if [ -z "$ORG" ]; then
            echo "::error::SONAR_ORGANIZATION est vide. Valeur attendue : yassinedhahbi (sans espaces ni retour ligne)"
            exit 1
          fi
          if ! printf '%s' "$ORG" | grep -Eq '^[a-z0-9-]+$'; then
            echo "::error::SONAR_ORGANIZATION invalide. Utilisez la Organization Key SonarCloud (ex: yassinedhahbi), pas le nom affiche."
            exit 1
          fi
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar \
            -Dsonar.organization="$ORG" \
            -Dsonar.projectKey="${ORG}_smarttax-backend" \
            -Dsonar.projectName="SmartTax Backend" \
            -Dsonar.host.url=https://sonarcloud.io

  publish-image:
    name: Publish image (GHCR)
    runs-on: ubuntu-latest
    needs: backend
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
