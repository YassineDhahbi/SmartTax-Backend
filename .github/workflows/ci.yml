# SmartTax Backend — CI Maven + SonarCloud
# Declenchement : push ou PR sur main / master / develop

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B verify

      - name: Verify SonarCloud secrets
        run: |
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "::error::Ajoutez le secret GitHub SONAR_TOKEN (SonarCloud > My Account > Security > Generate Token)"
            exit 1
          fi
          if [ -z "${{ secrets.SONAR_ORGANIZATION }}" ]; then
            echo "::error::Ajoutez le secret GitHub SONAR_ORGANIZATION (cle d organisation SonarCloud, ex: yassinedhahbi)"
            exit 1
          fi

      - name: SonarCloud analysis (Maven)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x mvnw
          ./mvnw -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.organization="${{ secrets.SONAR_ORGANIZATION }}" \
            -Dsonar.projectKey="${{ secrets.SONAR_ORGANIZATION }}_smarttax-backend" \
            -Dsonar.projectName="SmartTax Backend" \
            -Dsonar.host.url=https://sonarcloud.io
